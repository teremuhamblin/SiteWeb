<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Contact – SiteWeb</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Contactez l’équipe du projet SiteWeb." />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header>
  <div class="nav-container">
    <a href="index.html" class="brand">
      <div class="brand-logo">R</div>
      <div class="brand-text">
        <span>SiteWeb</span>
        <span>Projet</span>
      </div>
    </a>
    <nav>
      <ul>
        <li><a href="index.html">Accueil</a></li>
        <li><a href="projects.html">Projets</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
        <li><a href="docs.html">Documentation</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>

  <section class="section">
    <h1>Contact</h1>
    <p class="lead">Envoyez-nous un message via ce formulaire.</p>

    <form class="card" style="max-width: 600px; margin: auto;">
      <div class="form-group">
        <label for="name">Nom</label>
        <input id="name" type="text" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" required />
      </div>

      <div class="form-group">
        <label for="subject">Sujet</label>
        <input id="subject" type="text" />
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" rows="5" required></textarea>
      </div>

      <button class="btn btn-primary" type="submit">Envoyer</button>
    </form>
  </section>

</main>

<footer>
  <div class="footer-inner">
    <div>© <span id="year"></span> SiteWeb – Projet v1.1</div>
    <div class="footer-links">
      <a href="docs.html">Documentation</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</footer>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
